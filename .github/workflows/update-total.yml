name: Update JustGiving Total

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch JustGiving total and update index.html
        run: |
          # Try JustGiving's internal API
          RESPONSE=$(curl -s "https://api.justgiving.com/bb6edbbb/v1/fundraising/pages/jeff-lancaster-1000" \
            -H "Accept: application/json" \
            -H "x-api-key: bb6edbbb")

          echo "=== API RESPONSE ==="
          echo "$RESPONSE" | head -c 1000
          echo "=== END ==="

          RAISED=$(echo "$RESPONSE" | grep -oP '(?<="grandTotalRaisedExcludingGiftAid":)\d+(\.\d+)?' | head -1)
          if [ -z "$RAISED" ]; then RAISED=$(echo "$RESPONSE" | grep -oP '(?<="totalRaised":)\d+(\.\d+)?' | head -1); fi
          if [ -z "$RAISED" ]; then RAISED=$(echo "$RESPONSE" | grep -oP '(?<="raisedAmount":)\d+(\.\d+)?' | head -1); fi

          echo "Raised amount found: $RAISED"

          if [ -z "$RAISED" ]; then
            echo "Could not find raised amount, skipping update"
            exit 0
          fi

          FORMATTED=$(printf "%.0f" "$RAISED" | sed ':a;s/\B[0-9]\{3\}\b/,&/;ta')
          DISPLAY="£${FORMATTED}"

          sed -i "s|<div id=\"jg-total\"[^>]*>[^<]*</div>|<div id=\"jg-total\" style=\"font-size:3rem;font-weight:900;color:#06b6d4;line-height:1\">${DISPLAY}</div>|" index.html
          echo "Updated index.html with $DISPLAY"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes" && exit 0
          git add index.html
          git commit -m "Update JustGiving total [skip ci]"
          git push
